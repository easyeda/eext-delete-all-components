<!doctype html>
<html lang="zh-Hans">
<head>
  <title id="pageTitle"></title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <table>
    <tbody>
      <tr>
        <td align="right"><span id="lblSelectLib" style="font-size: 14px"></span></td>
        <td>
          <select id="librarySelect" style="max-width: 160px">
            <option value="">---</option>
          </select>
        </td>
      </tr>
      <tr>
        <td align="right"><span id="lblDelContent" style="font-size: 14px"></span></td>
        <td>
          <label><input type="checkbox" id="chkDevice" /> <span id="lblDevice"></span></label><br />
          <label><input type="checkbox" id="chkSymbol" /> <span id="lblSymbol"></span></label><br />
          <label><input type="checkbox" id="chkFootprint" /> <span id="lblFootprint"></span></label>
          <p id="lblDescription" style="font-size:11px; color:#666;"></p>
        </td>
      </tr>
    </tbody>
  </table>
  <br />
  <input id="deleteButton" value="" type="button" />&nbsp;
  <span id="messageBar" style="font-size: 11px"></span>

<script>
  var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
  function t(tag, ...args) {
    if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag, undefined, undefined, ...args);
    return tag;
  }

  // Apply i18n to HTML elements
  document.getElementById('pageTitle').textContent = t('Delete Library Components/Symbols/Footprints');
  document.getElementById('lblSelectLib').textContent = t('Select Library:');
  document.getElementById('lblDelContent').textContent = t('Content to Delete:');
  document.getElementById('lblDevice').textContent = t('Devices');
  document.getElementById('lblSymbol').textContent = t('Symbols');
  document.getElementById('lblFootprint').textContent = t('Footprints');
  document.getElementById('lblDescription').textContent = t('All three are independent, multiple selections allowed.');
  document.getElementById('deleteButton').value = t('Execute Delete');
  document.getElementById('messageBar').textContent = t('Please select library and content to delete');

  document.getElementById('librarySelect').onclick = async function () {
    if (this.options.length > 1) return;

    const libs = [];
    const add = (name, uuid) => uuid && libs.push({ name, uuid });

    const personal = await eda.lib_LibrariesList.getPersonalLibraryUuid();
    add(t('Personal'), await eda.lib_LibrariesList.getPersonalLibraryUuid());
    add(t('Project'), await eda.lib_LibrariesList.getProjectLibraryUuid());
    add(t('Favorites'), await eda.lib_LibrariesList.getFavoriteLibraryUuid());
    libs.push(...(await eda.lib_LibrariesList.getAllLibrariesList()));

    libs.forEach(lib => {
      const opt = document.createElement('option');
      opt.value = lib.uuid;
      opt.textContent = lib.name;
      this.appendChild(opt);
    });
  };

  async function searchAllUuids(apiSearch, libraryUuid, typeName) {
    const itemsOfPage = 10000;
    try {
      const result = await apiSearch('', libraryUuid, undefined, 2, itemsOfPage, 1);
      return (result || []).map(item => item.uuid);
    } catch (err) {
      console.error(t('Search type failed:', typeName), err);
      return [];
    }
  }

  async function searchFootprints(libraryUuid) {
    const itemsOfPage = 10000;
    try {
      const result = await eda.lib_Footprint.search('', libraryUuid, undefined, itemsOfPage, 1);
      return (result || []).map(item => item.uuid);
    } catch (err) {
      console.error(t('Search Footprints failed:'), err);
      return [];
    }
  }

  document.getElementById('deleteButton').onclick = function () {
    const libSel = document.getElementById('librarySelect');
    const libUuid = libSel.value;
    if (!libUuid) return alert(t('Please select a library first!'));

    const libName = libSel.options[libSel.selectedIndex].text;

    const delDev = document.getElementById('chkDevice').checked;
    const delSym = document.getElementById('chkSymbol').checked;
    const delFp  = document.getElementById('chkFootprint').checked;

    if (!delDev && !delSym && !delFp) return alert(t('Please select at least one item to delete!'));

    const types = [];
    if (delDev) types.push(t('Devices'));
    if (delSym) types.push(t('Symbols'));
    if (delFp)  types.push(t('Footprints'));

    const content = t('Warning permanently delete from library', libName, types.join('\n• '));

    eda.sys_Dialog.showConfirmationMessage(
      content,
      t('Confirm Delete'),
      t('OK'),
      t('Cancel'),
      async (mainButtonClicked) => {
        if (!mainButtonClicked) return;

        const deleteButton = document.getElementById('deleteButton');
        deleteButton.disabled = true;
        const msg = document.getElementById('messageBar');

        try {
          let totalDeleted = 0;
          const allDeletionPromises = [];

          if (delDev) {
            msg.innerHTML = t('Fetching devices list...');
            const devUuids = await searchAllUuids(eda.lib_Device.search, libUuid, t('Devices'));
            msg.innerHTML = t('Found devices, starting deletion...', devUuids.length);
            const devPromises = devUuids.map(uuid => eda.lib_Device.delete(uuid, libUuid));
            allDeletionPromises.push(...devPromises);
            totalDeleted += devUuids.length;
          }

          if (delSym) {
            msg.innerHTML = t('Fetching symbols list...');
            const symUuids = await searchAllUuids(eda.lib_Symbol.search, libUuid, t('Symbols'));
            msg.innerHTML = t('Found symbols, starting deletion...', symUuids.length);
            const symPromises = symUuids.map(uuid => eda.lib_Symbol.delete(uuid, libUuid));
            allDeletionPromises.push(...symPromises);
            totalDeleted += symUuids.length;
          }

          if (delFp) {
            msg.innerHTML = t('Fetching footprints list...');
            const fpUuids = await searchFootprints(libUuid);
            msg.innerHTML = t('Found footprints, starting deletion...', fpUuids.length);
            const fpPromises = fpUuids.map(uuid => eda.lib_Footprint.delete(uuid, libUuid));
            allDeletionPromises.push(...fpPromises);
            totalDeleted += fpUuids.length;
          }

          await Promise.all(allDeletionPromises);

          msg.innerHTML = t('Deletion complete!', totalDeleted);
          alert(t('Selected content in library has been deleted!', libName));

        } catch (error) {
          console.error(t('Error during deletion:'), error);
          msg.innerHTML = t('Operation failed. Please check console logs.');
          alert(t('Operation failed. Please check console error messages.'));
        } finally {
          deleteButton.disabled = false;
        }
      }
    );
  };
</script>




</body>
</html>
