<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="pageTitle"></title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 16px;
            background: #f5f7fa;
            margin: 0;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 12px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            font-family: Consolas, Monaco, monospace;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
            box-sizing: border-box;
        }
        .btn-group {
            margin: 12px 0;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #2980b9;
        }
        button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        #output {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 16px;
            border-radius: 6px;
            font-family: Consolas, Monaco, monospace;
            font-size: 14px;
            white-space: pre-wrap;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #7f8c8d;
        }
        .placeholder {
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="heading"></h2>
        <textarea id="codeInput" spellcheck="false"></textarea>

        <div class="btn-group">
            <button id="runBtn"></button>
            <button id="clearBtn" style="background:#95a5a6; margin-left:8px;"></button>
        </div>

        <div id="output" class="placeholder"></div>
    </div>

    <script>
        var edaObj = (typeof eda !== 'undefined') ? eda : (window.parent && window.parent.eda);
        function t(tag, ...args) {
            if (edaObj && edaObj.sys_I18n) return edaObj.sys_I18n.text(tag, undefined, undefined, ...args);
            return tag;
        }

        // Apply i18n to HTML elements
        document.getElementById('pageTitle').textContent = t('General JS Executor');
        document.getElementById('heading').textContent = t('General JavaScript Executor');
        document.getElementById('runBtn').textContent = '▶ ' + t('Run Code');
        document.getElementById('clearBtn').textContent = '🗑️ ' + t('Clear Output');
        document.getElementById('output').textContent = t('Execution results will be displayed here...');
        document.getElementById('codeInput').value =
            '// ' + t('Enter any JavaScript code here') + '\n' +
            '// ' + t('Supports async/await, eda API, console.log, etc.') + '\n' +
            '\n' +
            '(async () => {\n' +
            '    const libs = await eda.lib_LibrariesList.getAllLibrariesList();\n' +
            '    const target = libs.find(l => l.name === "' + t('Test Team 2') + '");\n' +
            '    if (target) {\n' +
            '        console.log("' + t('Found library:') + '", target.name);\n' +
            '        return target.uuid;\n' +
            '    } else {\n' +
            '        console.warn("' + t('Target library not found') + '");\n' +
            '        return null;\n' +
            '    }\n' +
            '})();';

        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        function appendOutput(text, className = '') {
            const output = document.getElementById('output');
            output.classList.remove('placeholder');
            output.innerHTML += `${text}\n`;
            output.scrollTop = output.scrollHeight;
        }

        console.log = (...args) => {
            originalLog(...args);
            appendOutput(args.map(arg => typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)).join(' '));
        };

        console.error = (...args) => {
            originalError(...args);
            appendOutput(`[ERROR] ${args.map(arg => String(arg)).join(' ')}`, 'error');
        };

        console.warn = (...args) => {
            originalWarn(...args);
            appendOutput(`[WARN] ${args.map(arg => String(arg)).join(' ')}`, 'warn');
        };

        document.getElementById('runBtn').addEventListener('click', async () => {
            const code = document.getElementById('codeInput').value.trim();
            if (!code) {
                alert(t('Please enter JavaScript code!'));
                return;
            }

            const output = document.getElementById('output');
            output.innerHTML = '⏳ ' + t('Executing...') + '\n';
            output.classList.remove('placeholder');
            document.getElementById('runBtn').disabled = true;

            try {
                const asyncWrapper = `(async () => { ${code} })()`;
                const result = await eval(asyncWrapper);

                if (result !== undefined) {
                    console.log(t('Return value:'), result);
                }
            } catch (error) {
                console.error(t('Execution error:'), error.message || error);
            } finally {
                document.getElementById('runBtn').disabled = false;
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            const output = document.getElementById('output');
            output.innerHTML = '';
            output.classList.add('placeholder');
            output.textContent = t('Execution results will be displayed here...');
        });

        document.getElementById('codeInput').focus();
    </script>
</body>
</html>
